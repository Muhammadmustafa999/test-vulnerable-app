name: CI Security Scan
on: [push]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy Scan
        run: |
          trivy fs . --format json --output trivy-results.json --exit-code 0

      - name: Send Results to Platform
        run: |
          curl -X POST http://YOUR-SERVER/api/scan/upload/ \
            -H "Authorization: Token YOUR-API-TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"repo_name\": \"test-vulnerable-app\", \"branch\": \"main\", \"commit_sha\": \"$GITHUB_SHA\", \"trivy_results\": $(cat trivy-results.json)}"
